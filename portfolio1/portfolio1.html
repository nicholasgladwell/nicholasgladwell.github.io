<!DOCTYPE html>
<html>
  <div style="margin-bottom:20px;">
  <a href="../index.html">Home</a> |
  <a href="../projects.html">Projects</a>
</div>
<head>
  <script src="https://unpkg.com/ngl@latest/dist/ngl.js"></script>
</head>
<body>

<div style="margin-bottom:10px;">
<button onclick="toggleReceptors()">Switch 2A / 2B</button>
<button onclick="toggleComponent(o4)">Toggle Shared Residues</button>
</div>
  
<div id="receptorLabel" style="font-size:18px; margin-bottom:10px;">
  Showing: 5-HT2A </div>
  
<div id="viewport" style="width:800px; height:600px;"></div>

<div style="margin-bottom:10px;">
  <span style="color:lightgrey;">■ 5-HT2A</span>
  <span style="color:skyblue;">■ 5-HT2B</span>
  <span style="color:magenta;">■ Ligand</span>
  <span style="color:green;">■ Shared residues</span>
</div>
  
<script>
var stage = new NGL.Stage("viewport");

var o1, o2, o3, o4;

var showing2A = true;

var tooltip = document.createElement("div");
tooltip.style.position = "absolute";
tooltip.style.zIndex = 10;
tooltip.style.pointerEvents = "none";
tooltip.style.background = "rgba(0,0,0,0.6)";
tooltip.style.color = "white";
tooltip.style.padding = "5px";
tooltip.style.fontSize = "12px";
tooltip.style.display = "none";
document.body.appendChild(tooltip);

stage.signals.hovered.add(function (pickingProxy) {
    if (pickingProxy && pickingProxy.atom) {
        var atom = pickingProxy.atom;

        tooltip.innerHTML =
            "Residue: " + atom.resname + " " + atom.resno +
            "<br>Chain: " + atom.chainname;

        tooltip.style.left = pickingProxy.mouse.position.x + 10 + "px";
        tooltip.style.top = pickingProxy.mouse.position.y + 10 + "px";
        tooltip.style.display = "block";
    } else {
        tooltip.style.display = "none";
    }
});
Promise.all([
    stage.loadFile("aligned_2A.pdb"),
    stage.loadFile("aligned_2B.pdb"),
    stage.loadFile("ligand.pdb"),
    stage.loadFile("shared_residues.pdb")
]).then(function(components) {

    o1 = components[0];
    o2 = components[1];
    o3 = components[2];
    o4 = components[3];

  stage.signals.clicked.add(function (pickingProxy) {
    if (pickingProxy && pickingProxy.atom) {
        var resno = pickingProxy.atom.resno;
        var chain = pickingProxy.atom.chainname;

        // remove previous highlight
        stage.eachComponent(function (comp) {
            comp.removeAllRepresentations();
        });

        // re-add base representations
     

        // highlight clicked residue
        o1.addRepresentation("ball+stick", {
            sele: ":" + chain + " and " + resno,
            color: "orange",
            scale: 3
        });

        o2.addRepresentation("ball+stick", {
            sele: ":" + chain + " and " + resno,
            color: "orange",
            scale: 3
        });
    }
});

function addBaseRepresentations() {    
    o1.addRepresentation("cartoon", { color: "lightgrey", opacity: 0.7 });
    o2.addRepresentation("cartoon", { color: "skyblue", opacity: 0.5 });

    // show ligand(s)
    o3.addRepresentation("ball+stick", {
        color: "magenta",
        scale: 2
    });

    // highlight residues
    o4.addRepresentation("ball+stick", {
        color: "green",
        scale: 2
    });

    o1.addRepresentation("ball+stick", {
        sele: "242",
        color: "yellow",
        scale: 2
    });

    o2.addRepresentation("ball+stick", {
        sele: "225",
        color: "yellow",
        scale: 2
    });

    o1.addRepresentation("ball+stick", {
        sele: "131 or 227 or 228",
        color: "blue",
        scale: 2
    });

    o2.addRepresentation("ball+stick", {
        sele: "359 or 362 or 363",
        color: "red",
        scale: 2
    });
}

    addBaseRepresentations();
o1.setVisibility(true);
o2.setVisibility(false);

    // center on ligand
    o3.autoView();
});
o1.setVisibility(true);
o2.setVisibility(false);

function toggleReceptors() {
    if (showing2A) {
        o1.setVisibility(false);
        o2.setVisibility(true);
        document.getElementById("receptorLabel").innerHTML = '<span style="color: skyblue;">5-HT2B</span>';
    } else {
        o1.setVisibility(true);
        o2.setVisibility(false);
        document.getElementById("receptorLabel").innerHTML = '<span style="color: lightgrey;">5-HT2A</span>';
    }
    showing2A = !showing2A;
}

  function toggleComponent(comp) {
    comp.setVisibility(!comp.visible);
  }
</script>
</body>
</html>
