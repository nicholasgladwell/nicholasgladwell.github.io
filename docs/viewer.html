<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 1rem;
  line-height: 1.5;
  color: #212529;
}
.viewer-label {
  font-size: 18px;
  margin-bottom: 10px;
  font-weight: 500;
}
.viewer-btn {
  background-color: #2c3e50;
  color: white;
  border: none;
  padding: 8px 14px;
  margin-right: 8px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s ease;
}

.viewer-btn:hover {
  background-color: #1a252f;
}

.viewer-btn.secondary {
  background-color: #6c757d;
}

.viewer-btn.secondary:hover {
  background-color: #5a6268;
}

.rec-2a {
  color: lightgrey;
}

.rec-2b {
  color: skyblue;
}

</style>
  <script src="https://unpkg.com/ngl@latest/dist/ngl.js"></script>
</head>
<body>

<div style="margin-bottom:10px;">
<button class="viewer-btn secondary" onclick="toggleReceptors()">Switch 2A / 2B</button>
<button id="sharedBtn" class="viewer-btn secondary" onclick="toggleComponent(o4)">
  Hide Shared Residues
</button>
</div>

<div id="receptorLabel" class="viewer-label">
  Showing: 5-HT2A </div>
<div id="viewport" style="width:700px; height:500px;"></div>

<script>
var stage = new NGL.Stage("viewport");
stage.mouseControls.remove("hoverPick");
var o1, o2, o3, o4;
var showing2A = true;
function updateLabel() {
    const label = document.getElementById("receptorLabel");
    if (showing2A) {
        label.innerHTML = 'Showing: <span>5-HT2A</span>';
    } else {
        label.innerHTML = 'Showing: <span>5-HT2B</span>';
    }
}
function toggleReceptors() {
    showing2A = !showing2A;

    o1.setVisibility(showing2A);
    o2.setVisibility(!showing2A);

    updateLabel();
}
function toggleComponent(comp) {
    comp.setVisibility(!comp.visible);

    const btn = document.getElementById("sharedBtn");
    btn.innerText = comp.visible ? "Hide Shared Residues" : "Show Shared Residues";
}

var tooltip = document.createElement("div");
tooltip.style.position = "absolute";
tooltip.style.zIndex = 10;
tooltip.style.pointerEvents = "none";
tooltip.style.background = "rgba(0, 0, 0, 0.75)";
tooltip.style.borderRadius = "6px";
tooltip.style.padding = "6px 8px";
tooltip.style.fontSize = "12px";
tooltip.style.color = "white";
tooltip.style.boxShadow = "0 2px 6px rgba(0,0,0,0.3)";
document.body.appendChild(tooltip);

stage.signals.hovered.add(function (pickingProxy) {
    if (pickingProxy && pickingProxy.atom) {
        var atom = pickingProxy.atom;

        tooltip.innerHTML =
            "Residue: " + atom.resname + " " + atom.resno;

        tooltip.style.left = pickingProxy.mouse.position.x + 10 + "px";
        tooltip.style.top = pickingProxy.mouse.position.y + 10 + "px";
        tooltip.style.display = "block";
    } else {
        tooltip.style.display = "none";
    }
});

Promise.all([
    stage.loadFile("data/aligned_2A.pdb"),
    stage.loadFile("data/aligned_2B.pdb"),
    stage.loadFile("data/ligand.pdb"),
    stage.loadFile("data/shared_residues.pdb")
]).then(function(components) {

    o1 = components[0];
    o2 = components[1];
    o3 = components[2];
    o4 = components[3];

  stage.signals.clicked.add(function (pickingProxy) {
    if (pickingProxy && pickingProxy.atom) {
        var resno = pickingProxy.atom.resno;
        var chain = pickingProxy.atom.chainname;

        // remove previous highlight
        stage.eachComponent(function (comp) {
            comp.removeAllRepresentations();
        });

        // highlight clicked residue
        o1.addRepresentation("ball+stick", {
            sele: ":" + chain + " and " + resno,
            color: "orange",
            scale: 3
        });

        o2.addRepresentation("ball+stick", {
            sele: ":" + chain + " and " + resno,
            color: "orange",
            scale: 3
        });
    }
});

function addBaseRepresentations() {    
    o1.addRepresentation("cartoon", { color: "lightgrey", opacity: 0.7 });
    o2.addRepresentation("cartoon", { color: "skyblue", opacity: 0.5 });

    o3.addRepresentation("ball+stick", {
        color: "magenta",
        scale: 2
    });

    o4.addRepresentation("ball+stick", {
        color: "green",
        scale: 2
    });

    o1.addRepresentation("ball+stick", {
        sele: "242",
        color: "yellow",
        scale: 2
    });

    o2.addRepresentation("ball+stick", {
        sele: "225",
        color: "yellow",
        scale: 2
    });

    o1.addRepresentation("ball+stick", {
        sele: "131 or 227 or 228",
        color: "blue",
        scale: 2
    });

    o2.addRepresentation("ball+stick", {
        sele: "359 or 362 or 363",
        color: "red",
        scale: 2
    });
}

    addBaseRepresentations();
o1.setVisibility(true);
o2.setVisibility(false);
o3.autoView();
stage.viewerControls.orient([
-22.66990127708008, 
-0.325753048295523, 
15.423867381092615, 
0, 
15.268716894339168, 
3.447083091880684, 
22.51466469900767, 
0, 
-2.2063735945038974, 
27.201796393983866, 
-2.6684100982194616, 
0, 
22.898500442504883, 
17.649999618530273, 
-8.310500144958496, 
1
]);
});
</script>
<div id="receptorLabel" class="viewer-label" style="position: absolute; bottom: 30px; left: 30px; background: rgba(108, 117, 125, 0.85); color: white; padding: 10px; border-radius: 8px;">
<strong>Legend</strong><br>
LSD Ligand: Pink<br>
Shared Residues: Green<br>
Structurally Different: Blue/Red<br>
Chemically Different: Yellow
</div>
</body>
</html>
