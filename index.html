<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/ngl@latest/dist/ngl.js"></script>
</head>
<body>

<div id="viewport" style="width:800px; height:600px;"></div>

<script>
var stage = new NGL.Stage("viewport");

Promise.all([
    stage.loadFile("aligned_2A.pdb"),
    stage.loadFile("aligned_2B.pdb")
]).then(function(components) {

    var o1 = components[0];
    var o2 = components[1];

    // cartoons
    o1.addRepresentation("cartoon", { color: "residueindex" });
    o2.addRepresentation("cartoon", { color: "skyblue" });

    // core residues (2A)
    o1.addRepresentation("stick", {
        sele: "151 or 155 or 339",
        color: "green"
    });

    // chemically different
    o1.addRepresentation("stick", {
        sele: "242",
        color: "yellow"
    });

    // ligand
    o1.addRepresentation("stick", {
        sele: "7LD",
        color: "magenta"
    });

    // center everything properly
    stage.autoView();
});
</script>

</body>
</html>
