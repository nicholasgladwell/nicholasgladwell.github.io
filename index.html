<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/ngl@latest/dist/ngl.js"></script>
</head>
<body>

<div id="viewport" style="width:800px; height:600px;"></div>

<script>
var stage = new NGL.Stage("viewport");

Promise.all([
    stage.loadFile("aligned_2A.pdb"),
    stage.loadFile("aligned_2B.pdb")
]).then(function(components) {

    var o1 = components[0];
    var o2 = components[1];

    o1.addRepresentation("cartoon", { color: "lightgrey", opacity: 0.7 });
    o2.addRepresentation("cartoon", { color: "skyblue", opacity: 0.5 });

    o1.addRepresentation("ball+stick", {
        sele: "resname 7LD",
        scale: 2,
        color: "magenta"
    });

    o1.addRepresentation("ball+stick", {
        sele: "151 or 155 or 339 or 242",
        color: "green",
        scale: 2
    });


    stage.autoView("resname 7LD");
});
</script>

</body>
</html>
