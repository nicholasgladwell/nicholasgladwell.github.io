<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/ngl@latest/dist/ngl.js"></script>
</head>
<body>

<div id="viewport" style="width:800px; height:600px;"></div>

<script>
var stage = new NGL.Stage("viewport");

Promise.all([
    stage.loadFile("aligned_2A.pdb"),
    stage.loadFile("aligned_2B.pdb")
]).then(function(components) {

    var o1 = components[0];
    var o2 = components[1];

    // cartoons
    o1.addRepresentation("cartoon", {
    color: "lightgrey",
    opacity: 0.7
});

// show ALL hetero atoms (debug + ensures ligand shows)
o1.addRepresentation("ball+stick", {
    sele: "hetero",
    scale: 2,
    aspectRatio: 1.5,
    color: "magenta"
});

// highlight your residues
o1.addRepresentation("ball+stick", {
    sele: "151 or 155 or 339 or 242",
    color: "green",
    scale: 2
});

    // center everything properly
    stage.autoView("resname 7LD");
});
</script>

</body>
</html>
